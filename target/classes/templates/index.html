<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Controle de Projetos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container-fluid py-4">
    <h1 class="text-center mb-5">Controle de Projetos</h1>

    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">1. Responsáveis</div>
                <div class="card-body">
                    <form th:action="@{/salvarResponsavelFront}" th:object="${novoResponsavel}" method="post">
                        <input type="text" th:field="*{nome}" class="form-control mb-2" placeholder="Nome" required>
                        <input type="email" th:field="*{email}" class="form-control mb-2" placeholder="Email" required>
                        <button type="submit" class="btn btn-primary w-100">Adicionar Responsável</button>
                    </form>
                    <hr>
                    <ul class="list-group">
                        <li th:each="r : ${responsaveis}" class="list-group-item d-flex justify-content-between align-items-center">

                            <span th:text="${r.nome} + ' (' + ${r.email} + ')'"></span>

                            <div class="d-flex gap-2">
                                <a th:href="@{/responsaveis/editar/{idResponsavel}(idResponsavel=${r.idResponsavel})}" class="btn btn-warning btn-sm">Editar</a>
                                <a th:href="@{/responsaveis/excluir/{idResponsavel}(idResponsavel=${r.idResponsavel})}" class="btn btn-danger btn-sm" onclick="return confirm('Tem certeza que deseja excluir este responsável?');">Excluir</a>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">2. Projetos</div>
                <div class="card-body">
                    <form th:action="@{/salvarProjetoFront}" th:object="${novoProjeto}" method="post">
                        <input type="text" th:field="*{nomeProjeto}" class="form-control mb-2" placeholder="Nome do Projeto" required>
                        <input type="date" th:field="*{dataInicio}" class="form-control mb-2" required>

                        <select th:field="*{responsavel.idResponsavel}" class="form-select mb-2" required>
                            <option value="" disabled selected>Selecione um Responsável...</option>
                            <option th:each="r : ${responsaveis}" th:value="${r.idResponsavel}" th:text="${r.nome}"></option>
                        </select>

                        <button type="submit" class="btn btn-success w-100">Adicionar Projeto</button>
                    </form>
                    <hr>
                    <ul class="list-group">
                        <li th:each="p : ${projetos}" class="list-group-item d-flex justify-content-between align-items-center">

                            <div>
                                <strong th:text="${p.nomeProjeto}"></strong><br>
                                <small class="text-muted">Resp: <span th:text="${p.responsavel.nome}"></span></small>
                            </div>

                            <div class="d-flex gap-2">
                                <a th:href="@{/projetos/editar/{idProjeto}(idProjeto=${p.idProjeto})}" class="btn btn-warning btn-sm">Editar</a>
                                <a th:href="@{/projetos/excluir/{idProjeto}(idProjeto=${p.idProjeto})}" class="btn btn-danger btn-sm" onclick="return confirm('Tem certeza que deseja excluir este projeto?');">Excluir</a>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-warning text-dark">3. Tarefas</div>
                <div class="card-body">
                    <form th:action="@{/salvarTarefaFront}" th:object="${novaTarefa}" method="post">
                        <input type="text" th:field="*{descricao}" class="form-control mb-2" placeholder="Descrição da Tarefa" required>

                        <select th:field="*{statusTarefa}" class="form-select mb-2">
                            <option value="Pendente">Pendente</option>
                            <option value="Em Andamento">Em Andamento</option>
                            <option value="Concluída">Concluída</option>
                        </select>

                        <select th:field="*{projeto.idProjeto}" class="form-select mb-2" required>
                            <option value="" disabled selected>Vincular a qual Projeto?</option>
                            <option th:each="p : ${projetos}" th:value="${p.idProjeto}" th:text="${p.nomeProjeto}"></option>
                        </select>

                        <button type="submit" class="btn btn-warning w-100">Adicionar Tarefa</button>
                    </form>
                    <hr>
                    <ul class="list-group">
                        <li th:each="t : ${tarefas}" class="list-group-item d-flex justify-content-between align-items-center">

                            <div>
                                <strong th:text="${t.descricao}"></strong>
                                <span class="badge bg-secondary rounded-pill ms-2" th:text="${t.statusTarefa}"></span><br>
                                <small class="text-muted">Proj: <span th:text="${t.projeto.nomeProjeto}"></span></small>
                            </div>

                            <div class="d-flex gap-2">
                                <a th:href="@{/tarefas/editar/{idTarefa}(idTarefa=${t.idTarefa})}" class="btn btn-warning btn-sm">Editar</a>
                                <a th:href="@{/tarefas/excluir/{idTarefa}(idTarefa=${t.idTarefa})}" class="btn btn-danger btn-sm" onclick="return confirm('Tem certeza que deseja excluir esta tarefa?');">Excluir</a>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
