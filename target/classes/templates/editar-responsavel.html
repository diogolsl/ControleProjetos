<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Editar Responsável</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<div class="container bg-white p-4 rounded shadow-sm" style="max-width: 600px;">
  <h2 class="mb-4" style="color: #423861">Editar Responsável</h2>

  <form th:action="@{/salvarResponsavelFront}" th:object="${responsavel}" method="post">

    <input type="hidden" th:field="*{idResponsavel}">

    <div class="mb-3">
      <label>Nome</label>
      <input type="text" class="form-control" th:field="*{nome}" required>
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control" th:field="*{email}" required>
    </div>

    <button type="submit" class="btn w-100" style="color: white; background-color: #423861">Salvar Alterações</button>
    <a th:href="@{/}" class="btn btn-secondary w-100 mt-2">Cancelar e Voltar</a>
  </form>
</div>

</body>
</html>
