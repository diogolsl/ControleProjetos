<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Editar Tarefa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<div class="container">
  <h2>Editar Tarefa</h2>

  <form th:action="@{/tarefas/salvar}" th:object="${tarefa}" method="post">

    <input type="hidden" th:field="*{idTarefa}">

    <div class="mb-3">
      <label>Descrição da Tarefa</label>
      <input type="text" class="form-control" th:field="*{descricao}" required>
    </div>

    <div class="mb-3">
      <label>Projeto</label>
      <select th:field="*{projeto.idProjeto}" class="form-select" required>
        <option th:each="p : ${projetos}" th:value="${p.idProjeto}" th:text="${p.nome}"></option>
      </select>
    </div>

    <button type="submit" class="btn btn-success">Salvar Alterações</button>
    <a th:href="@{/}" class="btn btn-secondary">Cancelar</a>
  </form>
</div>

</body>
</html>
