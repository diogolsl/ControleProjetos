<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Editar Tarefa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

<div class="container bg-white p-4 rounded shadow-sm" style="max-width: 600px;">
  <h2 class="mb-4 text-warning">Editar Tarefa</h2>

  <form th:action="@{/salvarTarefaFront}" th:object="${tarefa}" method="post">

    <input type="hidden" th:field="*{idTarefa}">

    <div class="mb-3">
      <label>Descrição da Tarefa</label>
      <input type="text" class="form-control" th:field="*{descricao}" required>
    </div>

    <div class="mb-3">
      <label>Status</label>
      <select th:field="*{statusTarefa}" class="form-select" required>
        <option value="Pendente">Pendente</option>
        <option value="Em Andamento">Em Andamento</option>
        <option value="Concluída">Concluída</option>
      </select>
    </div>

    <div class="mb-3">
      <label>Vincular a qual Projeto?</label>
      <select th:field="*{projeto.idProjeto}" class="form-select" required>
        <option th:each="p : ${projetos}" th:value="${p.idProjeto}" th:text="${p.nomeProjeto}"></option>
      </select>
    </div>

    <button type="submit" class="btn btn-warning w-100">Salvar Alterações</button>
    <a th:href="@{/}" class="btn btn-secondary w-100 mt-2">Cancelar e Voltar</a>
  </form>
</div>

</body>
</html>
