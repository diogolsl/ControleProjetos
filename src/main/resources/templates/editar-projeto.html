<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Editar Projeto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

  <div class="container bg-white p-4 rounded shadow-sm" style="max-width: 600px;">
  <h2 class="mb-4" style="color: #8B3A64">Editar Projeto</h2>

  <form th:action="@{/salvarProjetoFront}" th:object="${projeto}" method="post">

    <input type="hidden" th:field="*{idProjeto}">

    <div class="mb-3">
      <label>Nome do Projeto</label>
      <input type="text" class="form-control" th:field="*{nomeProjeto}" required>
    </div>

    <div class="mb-3">
      <label>Responsável</label>
      <select th:field="*{responsavel.idResponsavel}" class="form-select" required>
        <option th:each="r : ${responsaveis}" th:value="${r.idResponsavel}" th:text="${r.nome}"></option>
      </select>
    </div>

    <button type="submit" class="btn w-100" style="color: white; background-color: #8B3A64">Salvar Alterações</button>
    <a th:href="@{/}" class="btn btn-secondary w-100 mt-2">Cancelar e Voltar</a>
  </form>
</div>

</body>
</html>
